apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-app
  namespace: devopshubofficial-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee
  template:
    metadata:
      labels:
        app: employee
  spec:
      containers:
      - name: employee
        image: image-registry.openshift-image-registry.svc:5000/demo/employee-app:latest
        ports:
        - containerPort: 8080
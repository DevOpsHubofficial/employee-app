apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-app
  namespace: devopshubofficial-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee
  template:
    metadata:
      labels:
        app: employee
  spec:
      containers:
      - name: employee
        image: docker.io/ibrahim3/employee-app:v2
        ports:
        - containerPort: 8080
        
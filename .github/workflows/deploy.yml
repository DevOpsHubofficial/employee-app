name: Build and Deploy to OpenShift

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: employee-app

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/employee-app:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-app:latest

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: |
          oc login \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ secrets.OPENSHIFT_SERVER }}

      - name: Select Project
        run: |
          oc project ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Deploy Kubernetes Resources
        run: |
          oc apply -f deployment.yaml
          oc apply -f service.yaml
          oc apply -f route.yaml

      - name: Update Deployment Image
        run: |
          oc set image deployment/employee-app \
            employee=docker.io/${{ secrets.DOCKER_USERNAME }}/employee-app:latest

      - name: Verify Rollout
        run: |
          oc rollout status deployment/employee-app --timeout=300s

      - name: Verify Pods
        run: |
          oc get pods
          oc get svc
          oc get route
